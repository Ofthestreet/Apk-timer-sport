name: Build Android APK

on:
  push:
    branches: [ "**" ]
    paths:
      - 'android-interval-timer/**'
  pull_request:
    paths:
      - 'android-interval-timer/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: |
          cd android-interval-timer
          gradle wrapper --gradle-version 8.6
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd android-interval-timer
          ./gradlew assembleDebug --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: interval-timer-debug
          path: android-interval-timer/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create or update latest release
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Dernier build automatique"
          prerelease: true
          files: android-interval-timer/app/build/outputs/apk/debug/*.apk
          body: |
            Build automatique depuis la branche `${{ github.ref_name }}`
            Commit : `${{ github.sha }}`
            Date : ${{ github.event.head_commit.timestamp }}

      - name: Create versioned release on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          prerelease: false
          files: android-interval-timer/app/build/outputs/apk/debug/*.apk
          body: |
            Release automatique depuis `main`
            Commit : `${{ github.sha }}`
